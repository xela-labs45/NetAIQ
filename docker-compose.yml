services:
  netmon:
    build: .
    # EXPOSE: Internal port for Caddy proxy. Keep this if using the internal Caddy service.
    expose:
      - "${PORT:-3001}"

    # PORTS: Uncomment the section below ONLY if you want to bypass Caddy and access the app directly 
    # (e.g., if you have your own Nginx/Traefik reverse proxy on the host).
    # ports:
    #   - "3001:3001"

    # NET_RAW and NET_ADMIN are required for ARP-based
    # MAC discovery on the local L2 segment.
    # These capabilities are safe — they only allow
    # the container to send/receive raw network packets
    # on the host network. Remove if not using MAC
    # discovery on Linux hosts.
    cap_add:
      - NET_RAW
      - NET_ADMIN

    volumes:
      - ./data:/app/data # persist SQLite DB
      - ./server/public:/app/server/public # host build is reflected in the container
    env_file: .env
    restart: always

  # CADDY: Provides automatic SSL/HTTPS. 
  # Comment out or delete this entire section if you are managing SSL yourself.
  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "${HTTP_PORT:-3080}:80"
      - "${HTTPS_PORT:-3443}:443"
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - netmon

volumes:
  caddy_data:
  caddy_config:
