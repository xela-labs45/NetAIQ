# ─────────────────────────────────────────────────────────────────────────────
# NetAIQ — default stack (HTTP, direct access)
#
# This file runs the app with no reverse proxy. The app is accessible over
# plain HTTP on PORT (default 3001) — ideal for LAN / home-lab use where
# the network itself is trusted.
#
# HTTPS with automatic SSL:
#   docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d
#
# See docker-compose.caddy.yml and the README for full SSL instructions.
# ─────────────────────────────────────────────────────────────────────────────

services:
  netaiq:
    build: .

    # Host networking gives the container direct access to the physical NIC
    # (e.g. enp0s3 / eth0) so os.networkInterfaces() returns the real LAN
    # interface and nmap ARP scanning targets the actual L2 segment.
    # Without this the container is isolated on a Docker bridge (172.x.x.x)
    # and L2 detection picks the wrong interface.
    # Port bindings are unnecessary in host mode — the app binds PORT on the
    # host network stack directly.
    network_mode: host

    # NET_RAW / NET_ADMIN are required for nmap's ARP-based MAC discovery on
    # the local L2 segment. The Dockerfile uses `setcap` so only the nmap
    # binary inherits these capabilities — the Node process itself does not.
    # On Windows Docker Desktop (WSL2/Hyper-V) these are accepted but inert;
    # ARP discovery does not work there. Remove both if you don't need MAC
    # discovery.
    cap_add:
      - NET_RAW
      - NET_ADMIN

    # Block privilege escalation via setuid binaries inside the container.
    security_opt:
      - no-new-privileges:true

    volumes:
      - ./data:/app/data # SQLite DB persistence
    env_file: .env
    restart: always

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
