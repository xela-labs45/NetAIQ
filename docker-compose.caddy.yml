# ─────────────────────────────────────────────────────────────────────────────
# NetAIQ — Caddy HTTPS overlay
#
# Layer this on top of docker-compose.yml to add automatic SSL via Caddy:
#
#   docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d
#
# Caddy automatically picks the right certificate issuer:
#   - localhost or LAN IP  →  Caddy internal CA (self-signed, browser warning)
#   - Public domain        →  Let's Encrypt (trusted by all browsers, free)
#
# Both services run with network_mode: host so the app can see the physical
# NIC for L2 / ARP scanning. Caddy binds ports 80 and 443 directly on the
# host — no port-mapping needed.
#
# Required .env variables (add these if using this overlay):
#   SITE_ADDRESS=localhost       # or your LAN IP / public domain
#
# Caddy listens on ports 80 (HTTP redirect) and 443 (HTTPS) directly on the
# host. For Let's Encrypt the host must be reachable on port 80 from the
# public internet so the ACME HTTP-01 challenge can succeed.
# ─────────────────────────────────────────────────────────────────────────────

services:
  netaiq:
    # Caddy is the only entry point — enforce secure cookies.
    environment:
      - COOKIE_SECURE=true
    # Host networking is inherited from docker-compose.yml (required for L2
    # scanning). No additional network config needed here.

  caddy:
    # Pinned minor version for reproducible builds. Bump deliberately after
    # reviewing the Caddy changelog.
    image: caddy:2.8-alpine
    restart: always
    # Both services share the host network stack so Caddy reaches netaiq at
    # localhost:3001 and binds ports 80/443 directly on the host NIC.
    # Port mapping is not needed in host mode.
    network_mode: host
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-localhost}
    volumes:
      # Read-only so Caddy can't modify its own config at runtime.
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # caddy_data holds issued certs and the ACME account key — treat as
      # sensitive. Back it up; never commit it.
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Required to bind ports 80 and 443 as a non-root user.
      - NET_BIND_SERVICE
    depends_on:
      netaiq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
